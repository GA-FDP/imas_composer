[workspace]
name = "imas_composer"
channels = ["conda-forge", "ga-fdp"]
platforms = ["linux-64"]

# Core runtime dependencies (default environment)
[dependencies]
python = ">=3.11"
numpy = "1.*"
pyyaml = "*"
awkward = "*"
scipy = "*"

[pypi-dependencies]
imas_composer = { path = ".", editable = true }

# Test environment: adds mdsplus, ptdata, pytest, omas, and omfit-classes.
# pip is included as a conda dep so 'pixi run -e test pip' routes to the pixi Python.
[feature.test.dependencies]
pip = "*"
pytest = "*"
pytest-benchmark = "*"
pytest-xdist = "*"
pexpect = "*"
tqdm = "*"
mdsplus = "7.139.59.*"
ptdata = "*"
# Transitive deps of omas/omfit-classes — installed via conda for solver stability
matplotlib = "*"
pandas = "*"
xarray = "*"
h5py = "*"
netcdf4 = "*"
pint = "*"
uncertainties = "*"
cython = "*"
dnspython = "*"
python-dateutil = "*"
flexcache = "*"
flexparser = "*"
pillow = "*"
fonttools = "*"
kiwisolver = "*"
contourpy = "*"
cycler = "*"
platformdirs = "*"
pyparsing = "*"
six = "*"
cftime = "*"

[feature.test.pypi-dependencies]
omas = { git = "https://github.com/gafusion/omas.git", rev = "b2c91e534b56a49bd4f8caf449c7f2fe11addd31" }

[environments]
default = { features = [], solve-group = "default" }
test = { features = ["test"], solve-group = "default" }
