name: PR Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (excluding D3D data tests)
        run: |
          pytest -v -m "not requires_d3d_data and not baseline_validation"

  check-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -E '^version = ' imas_composer/pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "PR version: $VERSION"

      - name: Fetch all tags
        run: git fetch --tags

      - name: Check if version tag already exists
        id: check_tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="v$VERSION"

          echo "Checking if tag $TAG exists..."

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "❌ ERROR: Tag $TAG already exists!"
            echo "exists=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ SUCCESS: Tag $TAG does not exist - version is unique"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: List existing tags for reference
        if: failure()
        run: |
          echo "Existing tags in repository:"
          git tag -l | sort -V | tail -n 10
          echo ""
          echo "Please update the version in imas_composer/pyproject.toml to a new, unused version number."

      - name: Comment on PR (if check fails)
        if: failure() && steps.check_tag.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Version Check Failed**\n\nThe version `${{ steps.get_version.outputs.tag }}` in `imas_composer/pyproject.toml` already exists as a tag in this repository.\n\nPlease update the version to a new, unused version number before merging.'
            })

      - name: Version check passed
        if: success()
        run: |
          echo "✅ Version check passed! Version ${{ steps.get_version.outputs.version }} is unique."
