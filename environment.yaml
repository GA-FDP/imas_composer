name: imas_composer


channels:
  - conda-forge
  - ga-fdp

dependencies:
  - python==3.12
  - awkward
  - pyyaml
  - pytest
  - numpy 1.*
  - mdsplus
  - scipy
  - pytest-benchmark
  - pytest-xdist
  - pip
  - ptdata
  - pip:
    # Install imas_composer in editable mode from current directory
    - -e .
    - git+https://github.com/gafusion/omas.git
