# Test configuration for TF (Toroidal Field) IDS

# Field-level exceptions for validation
field_exceptions: {}

# Requirement validation settings
requirement_validation:
  # MDSplus paths that use calibration/setup data (shot 0), not the requested shot
  allow_different_shot: []

# OMAS path mapping
# Maps imas_composer notation to OMAS notation for fetching reference data
omas_path_map:
  # Toroidal field at vacuum vessel radius
  tf.b_field_tor_vacuum_r.data: tf.b_field_tor_vacuum_r.data
  tf.b_field_tor_vacuum_r.time: tf.b_field_tor_vacuum_r.time
  tf.b_field_tor_vacuum_r.data_error_upper: tf.b_field_tor_vacuum_r.data_error_upper
