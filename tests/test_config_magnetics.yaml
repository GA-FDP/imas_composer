# Test configuration for Magnetics IDS

# Field-level exceptions for validation
field_exceptions: {}

# Requirement validation settings
requirement_validation:
  # MDSplus paths that use calibration/setup data (shot 0), not the requested shot
  allow_different_shot: []

# OMAS path mapping
# Maps imas_composer notation to OMAS notation for fetching reference data
omas_path_map:
  # Plasma current (index 0)
  magnetics.ip.0.data: magnetics.ip.0.data
  magnetics.ip.0.time: magnetics.ip.0.time
  magnetics.ip.0.data_error_upper: magnetics.ip.0.data_error_upper

  # Diamagnetic flux (index 0)
  magnetics.diamagnetic_flux.0.data: magnetics.diamagnetic_flux.0.data
  magnetics.diamagnetic_flux.0.time: magnetics.diamagnetic_flux.0.time
  magnetics.diamagnetic_flux.0.data_error_upper: magnetics.diamagnetic_flux.0.data_error_upper
