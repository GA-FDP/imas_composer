# Test configuration for Wall IDS

# Fields to skip OMAS comparison for (composer still tested)
# Format: field_path: "reason for skipping"
skip_fields: {}

# Requirement validation settings
requirement_validation:
  # MDSplus paths that use calibration/setup data (shot 0), not the requested shot
  allow_different_shot: []

# OMAS path mapping
# Maps imas_composer notation to OMAS notation for fetching reference data
# Wall fields are simple scalar/array fields with no nested indexing
omas_path_map:
  wall.description_2d.limiter.unit.outline.r: wall.description_2d.:.limiter.unit.:.outline.r
  wall.description_2d.limiter.unit.outline.z: wall.description_2d.:.limiter.unit.:.outline.z
  wall.description_2d.limiter.type.index: wall.description_2d.:.limiter.type.index
  wall.time: wall.time
  wall.ids_properties.homogeneous_time: wall.ids_properties.homogeneous_time
