# Test configuration for Charge Exchange IDS

# No shots excluded - CER data exists for all standard test shots
exclude_shots: []

# Field-level exceptions
field_exceptions: {}

# Fields to skip OMAS comparison for (composer still tested)
# Format: field_path: "reason for skipping"
skip_fields: {
  "charge_exchange.channel.ion.n_i_over_n_e.data_error_upper": "Not mapped in OMAS due to missing FZ(system)*_ERR entries.",
  "charge_exchange.channel.ion.t_i.error": "OMAS does not support error",
  "charge_exchange.channel.ion.velocity.error": "OMAS does not support error",
  "charge_exchange.code.parameters.total_installed_channels": "OMAS does not provide this"
}

# Requirement validation settings
requirement_validation:
  # All CER requirements use the actual shot (no calibration data from a different shot)
  allow_different_shot: []

  # Active channels are discovered via getnci and only fetched for channels with
  # LENGTH > 0. No channel requirements will be missing or raise exceptions.
  optional_requirements: []

# OMAS path mapping
# Maps imas_composer notation to OMAS notation for fetching reference data
# For channel fields, OMAS uses .: to index all channels at once
omas_path_map:
  # Channel metadata
  charge_exchange.channel.identifier: charge_exchange.channel.:.identifier
  charge_exchange.channel.name: charge_exchange.channel.:.name

  # Channel position (with time)
  charge_exchange.channel.position.r.data: charge_exchange.channel.:.position.r.data
  charge_exchange.channel.position.r.time: charge_exchange.channel.:.position.r.time
  charge_exchange.channel.position.z.data: charge_exchange.channel.:.position.z.data
  charge_exchange.channel.position.z.time: charge_exchange.channel.:.position.z.time
  charge_exchange.channel.position.phi.data: charge_exchange.channel.:.position.phi.data
  charge_exchange.channel.position.phi.time: charge_exchange.channel.:.position.phi.time

  # Ion temperature
  charge_exchange.channel.ion.t_i.data: charge_exchange.channel.:.ion.:.t_i.data
  charge_exchange.channel.ion.t_i.error: charge_exchange.channel.:.ion.:.t_i.error
  charge_exchange.channel.ion.t_i.data_error_upper: charge_exchange.channel.:.ion.:.t_i.data_error_upper
  charge_exchange.channel.ion.t_i.time: charge_exchange.channel.:.ion.:.t_i.time

  # Velocity (may need to be skipped if not in OMAS)
  charge_exchange.channel.ion.velocity.data: charge_exchange.channel.:.ion.:.velocity_tor.data
  charge_exchange.channel.ion.velocity.error: charge_exchange.channel.:.ion.:.velocity_tor.error
  charge_exchange.channel.ion.velocity.data_error_upper: charge_exchange.channel.:.ion.:.velocity_tor.data_error_upper
  charge_exchange.channel.ion.velocity.time: charge_exchange.channel.:.ion.:.velocity_tor.time

  # Ion fraction
  charge_exchange.channel.ion.n_i_over_n_e.data: charge_exchange.channel.:.ion.:.n_i_over_n_e.data
  charge_exchange.channel.ion.n_i_over_n_e.data_error_upper: charge_exchange.channel.:.ion.:.n_i_over_n_e.data_error_upper
  charge_exchange.channel.ion.n_i_over_n_e.time: charge_exchange.channel.:.ion.:.n_i_over_n_e.time

  # Z-effective
  charge_exchange.channel.zeff.data: charge_exchange.channel.:.zeff.data
  charge_exchange.channel.zeff.time: charge_exchange.channel.:.zeff.time
