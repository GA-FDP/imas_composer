# Test configuration for Charge Exchange IDS

# No shots excluded - CER data exists for all standard test shots
exclude_shots: []

# Field-level exceptions
field_exceptions: {}

# Requirement validation settings
requirement_validation:
  # All CER requirements use the actual shot (no calibration data from shot 0)
  allow_different_shot: []

  # CER channel paths for channels that don't exist in the MDS tree will raise
  # exceptions. These paths follow the pattern:
  #   \IONS::TOP.CER.CERQUICK.{SUBSYSTEM}.CHANNEL{NN}.{NODE}
  # Channels 1..MAX_CHANNELS are probed; non-existent channels return exceptions
  # which are handled gracefully by the compose functions.
  #
  # NOTE: If the requirements test fails for channels above the actual hardware
  # count (e.g., channels 33-40 for TANGENTIAL), reduce MAX_CHANNELS in
  # ChargeExchangeMapper or increase the optional_requirements list below.
  optional_requirements: []

# OMAS path mapping
# Maps imas_composer notation to OMAS notation for fetching/accessing reference data.
# CER data uses ion index 0 (ch['ion.0.*']) in OMAS.
omas_path_map:
  charge_exchange.channel.identifier: charge_exchange.channel.:.identifier
  charge_exchange.channel.name: charge_exchange.channel.:.name
  charge_exchange.channel.position.r.data: charge_exchange.channel.:.position.r.data
  charge_exchange.channel.position.r.time: charge_exchange.channel.:.position.r.time
  charge_exchange.channel.position.z.data: charge_exchange.channel.:.position.z.data
  charge_exchange.channel.position.z.time: charge_exchange.channel.:.position.z.time
  charge_exchange.channel.position.phi.data: charge_exchange.channel.:.position.phi.data
  charge_exchange.channel.position.phi.time: charge_exchange.channel.:.position.phi.time
  charge_exchange.channel.zeff.data: charge_exchange.channel.:.zeff.data
  charge_exchange.channel.zeff.time: charge_exchange.channel.:.zeff.time
  charge_exchange.channel.ion.n_i_over_n_e.data: charge_exchange.channel.:.ion.0.n_i_over_n_e.data
  charge_exchange.channel.ion.n_i_over_n_e.time: charge_exchange.channel.:.ion.0.n_i_over_n_e.time
  charge_exchange.channel.ion.t_i.data: charge_exchange.channel.:.ion.0.t_i.data
  charge_exchange.channel.ion.t_i.data_error_upper: charge_exchange.channel.:.ion.0.t_i.data_error_upper
  charge_exchange.channel.ion.t_i.time: charge_exchange.channel.:.ion.0.t_i.time
  charge_exchange.channel.ion.velocity_tor.data: charge_exchange.channel.:.ion.0.velocity_tor.data
  charge_exchange.channel.ion.velocity_tor.data_error_upper: charge_exchange.channel.:.ion.0.velocity_tor.data_error_upper
  charge_exchange.channel.ion.velocity_tor.time: charge_exchange.channel.:.ion.0.velocity_tor.time
