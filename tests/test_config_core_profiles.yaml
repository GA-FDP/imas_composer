# Test configuration for Core Profiles IDS

# Fields to skip OMAS comparison for (composer still tested for requirements resolution)
skip_fields:
  # psi_norm is imas_composer-only (not mapped in OMAS). The composer value is
  # still resolved/composed here; a dedicated test in test_core_profiles_composition.py
  # validates it against the OMAS-validated rho_pol_norm (rho_pol_norm == sqrt(psi_norm)).
  core_profiles.profiles_1d.grid.psi_norm: "imas_composer-only field, no OMAS reference"

# Requirement validation settings
requirement_validation:
  # MDSplus paths that use calibration data (shot 0 or cal_set), not the requested shot
  allow_different_shot: []

field_tolerances:
  core_profiles.time:
  # This uses interpolation so accuracy is limited
    rtol: 1.0e-8
    atol: 1.0e-8

  core_profiles.profiles_1d.time:
  # This uses interpolation so accuracy is limited
    rtol: 1.0e-8
    atol: 1.0e-8

  core_profiles.profiles_1d.grid.psi_magnetic_boundary:
  # Derived by interpolating the psi profile at psi_norm=1.0, so accuracy is limited
    rtol: 1.0e-6
    atol: 1.0e-6

# OMAS path mapping
# Maps imas_composer notation to OMAS notation for fetching reference data.
#
# Ion fields return ak.Array([time, ion, rho]) so the OMAS path uses two
# levels of ':' — the first iterates over time slices, the second over ions.
# _compare_recursive replaces each ':' with the running index, giving paths like
# core_profiles.profiles_1d.0.ion.1.temperature for (time=0, ion=1).
#
# Static metadata (label, z_n, a) has no time dimension — composer returns a
# 1D array indexed by ion.  A fixed time index of 0 is used and ':' iterates
# over ions, e.g. core_profiles.profiles_1d.0.ion.:.label.
omas_path_map:
  # Time fields
  core_profiles.time: core_profiles.time
  core_profiles.profiles_1d.time: core_profiles.profiles_1d.:.time
  core_profiles.ids_properties.homogeneous_time: core_profiles.ids_properties.homogeneous_time

  # Grid fields
  core_profiles.profiles_1d.grid.rho_tor_norm: core_profiles.profiles_1d.:.grid.rho_tor_norm
  core_profiles.profiles_1d.grid.rho_pol_norm: core_profiles.profiles_1d.:.grid.rho_pol_norm
  core_profiles.profiles_1d.grid.psi: core_profiles.profiles_1d.:.grid.psi
  core_profiles.profiles_1d.grid.psi_magnetic_axis: core_profiles.profiles_1d.:.grid.psi_magnetic_axis
  core_profiles.profiles_1d.grid.psi_magnetic_boundary: core_profiles.profiles_1d.:.grid.psi_magnetic_boundary
  # psi_norm has no OMAS reference (skipped above); mapping kept for documentation
  core_profiles.profiles_1d.grid.psi_norm: core_profiles.profiles_1d.:.grid.psi_norm

  # Electron profiles
  core_profiles.profiles_1d.electrons.density: core_profiles.profiles_1d.:.electrons.density
  core_profiles.profiles_1d.electrons.temperature: core_profiles.profiles_1d.:.electrons.temperature

  # Electron uncertainties (OMFIT_PROFS only)
  core_profiles.profiles_1d.electrons.density_error_upper: core_profiles.profiles_1d.:.electrons.density_error_upper
  core_profiles.profiles_1d.electrons.temperature_error_upper: core_profiles.profiles_1d.:.electrons.temperature_error_upper

  # Electron fit fields (OMFIT_PROFS only)
  core_profiles.profiles_1d.electrons.density_fit.measured: core_profiles.profiles_1d.:.electrons.density_fit.measured
  core_profiles.profiles_1d.electrons.density_fit.psi_norm: core_profiles.profiles_1d.:.electrons.density_fit.psi_norm
  core_profiles.profiles_1d.electrons.density_fit.rho_tor_norm: core_profiles.profiles_1d.:.electrons.density_fit.rho_tor_norm
  core_profiles.profiles_1d.electrons.density_fit.measured_error_upper: core_profiles.profiles_1d.:.electrons.density_fit.measured_error_upper
  core_profiles.profiles_1d.electrons.temperature_fit.measured: core_profiles.profiles_1d.:.electrons.temperature_fit.measured
  core_profiles.profiles_1d.electrons.temperature_fit.psi_norm: core_profiles.profiles_1d.:.electrons.temperature_fit.psi_norm
  core_profiles.profiles_1d.electrons.temperature_fit.rho_tor_norm: core_profiles.profiles_1d.:.electrons.temperature_fit.rho_tor_norm
  core_profiles.profiles_1d.electrons.temperature_fit.measured_error_upper: core_profiles.profiles_1d.:.electrons.temperature_fit.measured_error_upper

  # Ion profiles — two ':' levels: first=time slice, second=ion index
  # OMAS populates both ion[0] (D) and ion[1] (C) for these fields
  core_profiles.profiles_1d.ion.density_thermal: core_profiles.profiles_1d.:.ion.:.density_thermal
  core_profiles.profiles_1d.ion.temperature: core_profiles.profiles_1d.:.ion.:.temperature

  # Ion uncertainties (OMFIT_PROFS only) — same two-level ':' pattern
  core_profiles.profiles_1d.ion.density_thermal_error_upper: core_profiles.profiles_1d.:.ion.:.density_thermal_error_upper
  core_profiles.profiles_1d.ion.temperature_error_upper: core_profiles.profiles_1d.:.ion.:.temperature_error_upper

  # Ion static metadata — no time dimension; composer returns 1D array [n_ion].
  core_profiles.profiles_1d.ion.label: core_profiles.profiles_1d.:.ion.:.label
  core_profiles.profiles_1d.ion.element.z_n: core_profiles.profiles_1d.:.ion.:.element.:.z_n
  core_profiles.profiles_1d.ion.element.a: core_profiles.profiles_1d.:.ion.:.element.:.a

  # Ion profiles
  core_profiles.profiles_1d.ion.rotation_frequency_tor: core_profiles.profiles_1d.:.ion.:.rotation_frequency_tor
  core_profiles.profiles_1d.ion.density_fit.measured: core_profiles.profiles_1d.:.ion.:.density_fit.measured
  core_profiles.profiles_1d.ion.density_fit.psi_norm: core_profiles.profiles_1d.:.ion.:.density_fit.psi_norm
  core_profiles.profiles_1d.ion.density_fit.rho_tor_norm: core_profiles.profiles_1d.:.ion.:.density_fit.rho_tor_norm
  core_profiles.profiles_1d.ion.density_fit.measured_error_upper: core_profiles.profiles_1d.:.ion.:.density_fit.measured_error_upper
  core_profiles.profiles_1d.ion.temperature_fit.measured: core_profiles.profiles_1d.:.ion.:.temperature_fit.measured
  core_profiles.profiles_1d.ion.temperature_fit.psi_norm: core_profiles.profiles_1d.:.ion.:.temperature_fit.psi_norm
  core_profiles.profiles_1d.ion.temperature_fit.rho_tor_norm: core_profiles.profiles_1d.:.ion.:.temperature_fit.rho_tor_norm
  core_profiles.profiles_1d.ion.temperature_fit.measured_error_upper: core_profiles.profiles_1d.:.ion.:.temperature_fit.measured_error_upper

  # Ion toroidal velocity (OMFIT_PROFS only) — same two-level ':' pattern
  # OMAS populates both ion[0] (D, copied) and ion[1] (C) for the main velocity;
  # fit fields are C-only (D empty)
  core_profiles.profiles_1d.ion.velocity.toroidal: core_profiles.profiles_1d.:.ion.:.velocity.toroidal
  core_profiles.profiles_1d.ion.velocity.toroidal_error_upper: core_profiles.profiles_1d.:.ion.:.velocity.toroidal_error_upper
  core_profiles.profiles_1d.ion.velocity.toroidal_fit.measured: core_profiles.profiles_1d.:.ion.:.velocity.toroidal_fit.measured
  core_profiles.profiles_1d.ion.velocity.toroidal_fit.psi_norm: core_profiles.profiles_1d.:.ion.:.velocity.toroidal_fit.psi_norm
  core_profiles.profiles_1d.ion.velocity.toroidal_fit.rho_tor_norm: core_profiles.profiles_1d.:.ion.:.velocity.toroidal_fit.rho_tor_norm
  core_profiles.profiles_1d.ion.velocity.toroidal_fit.measured_error_upper: core_profiles.profiles_1d.:.ion.:.velocity.toroidal_fit.measured_error_upper

  # E-field (OMFIT_PROFS only)
  core_profiles.profiles_1d.e_field.radial: core_profiles.profiles_1d.:.e_field.radial

  # Pressures (OMFIT_PROFS only)
  core_profiles.profiles_1d.pressure_ion_non_thermal: core_profiles.profiles_1d.:.pressure_ion_non_thermal
  core_profiles.profiles_1d.pressure_ion_total: core_profiles.profiles_1d.:.pressure_ion_total
  core_profiles.profiles_1d.electrons.pressure: core_profiles.profiles_1d.:.electrons.pressure
  core_profiles.profiles_1d.pressure_total: core_profiles.profiles_1d.:.pressure_total

  # Effective charge (OMFIT_PROFS only)
  core_profiles.profiles_1d.zeff: core_profiles.profiles_1d.:.zeff
  core_profiles.profiles_1d.zeff_error_upper: core_profiles.profiles_1d.:.zeff_error_upper

  # Current densities (OMFIT_PROFS only)
  core_profiles.profiles_1d.j_ohmic: core_profiles.profiles_1d.:.j_ohmic
  core_profiles.profiles_1d.j_tor: core_profiles.profiles_1d.:.j_tor
  core_profiles.profiles_1d.j_bootstrap: core_profiles.profiles_1d.:.j_bootstrap

  # Global quantities
  core_profiles.global_quantities.v_loop: core_profiles.global_quantities.v_loop
