# Test configuration for PF Active IDS

# Field-level exceptions for validation
field_exceptions: {}

# Requirement validation settings
requirement_validation:
  # MDSplus paths that use calibration/setup data (shot 0), not the requested shot
  allow_different_shot: []

  # Optional requirements that may not exist for all shots
  optional_requirements: []

# OMAS path mapping (for ODS access)
# Maps imas_composer notation to OMAS ODS access paths
# For array structures, OMAS uses .: to index all elements at once
omas_path_map:
  # Coil-level fields (add .: to fetch all coils)
  pf_active.coil.identifier: pf_active.coil.:.identifier
  pf_active.coil.name: pf_active.coil.:.name
  pf_active.coil.function.index: pf_active.coil.:.function.:.index

  # Element-level fields (nested arrays: coils and elements)
  pf_active.coil.element.identifier: pf_active.coil.:.element.:.identifier
  pf_active.coil.element.name: pf_active.coil.:.element.:.name
  pf_active.coil.element.turns_with_sign: pf_active.coil.:.element.:.turns_with_sign
  pf_active.coil.element.geometry.geometry_type: pf_active.coil.:.element.:.geometry.geometry_type
  pf_active.coil.element.geometry.rectangle.r: pf_active.coil.:.element.:.geometry.rectangle.r
  pf_active.coil.element.geometry.rectangle.z: pf_active.coil.:.element.:.geometry.rectangle.z
  pf_active.coil.element.geometry.rectangle.width: pf_active.coil.:.element.:.geometry.rectangle.width
  pf_active.coil.element.geometry.rectangle.height: pf_active.coil.:.element.:.geometry.rectangle.height

  # Current data (add .: to fetch all coils)
  pf_active.coil.current.data: pf_active.coil.:.current.data
  pf_active.coil.current.time: pf_active.coil.:.current.time
  pf_active.coil.current.data_error_upper: pf_active.coil.:.current.data_error_upper

# OMAS fetch mapping (for machine_to_omas)
# Overrides omas_path_map entries when fetching data via machine_to_omas
# Uses wildcards to fetch entire branches efficiently
# Only specify entries that differ from omas_path_map
omas_fetch_map:
  # Fetch all coil identifiers and names together
  pf_active.coil.identifier: pf_active.coil.*
  pf_active.coil.name: pf_active.coil.*

  # Fetch all function data together
  pf_active.coil.function.index: pf_active.coil.:.function.*

  # Fetch all element data together (most efficient - gets entire element branch)
  pf_active.coil.element.identifier: pf_active.coil.:.element.*
  pf_active.coil.element.name: pf_active.coil.:.element.*
  pf_active.coil.element.turns_with_sign: pf_active.coil.:.element.*
  pf_active.coil.element.geometry.geometry_type: pf_active.coil.:.element.*
  pf_active.coil.element.geometry.rectangle.r: pf_active.coil.:.element.*
  pf_active.coil.element.geometry.rectangle.z: pf_active.coil.:.element.*
  pf_active.coil.element.geometry.rectangle.width: pf_active.coil.:.element.*
  pf_active.coil.element.geometry.rectangle.height: pf_active.coil.:.element.*

  # Fetch all current data together
  pf_active.coil.current.data: pf_active.coil.:.current.*
  pf_active.coil.current.time: pf_active.coil.:.current.*
  pf_active.coil.current.data_error_upper: pf_active.coil.:.current.*

# Field-specific tolerances (if needed)
field_tolerances: {}

# Shots to exclude for this IDS
exclude_shots: []

# Field-specific shot exclusions (if certain coils unavailable on certain shots)
field_shot_exclusions: {}
