# Core Profiles IDS Configuration for DIII-D - OMFIT_PROFS Tree
#
# This configuration is for OMFIT_PROFS tree with extended metadata and uncertainties

# Static values (hardcoded, not from MDSplus)
static_values:
  ids_properties.homogeneous_time: 1

# Default OMFIT_PROFS tree and run_id
default_tree: OMFIT_PROFS
default_run_id: '001'

# Ion species mapping (order defines the ion array index in ak.Array outputs)
ions:
  - label: D
    z_n: 1.0
    a: 2.0141
  - label: C
    z_n: 6.0
    a: 12.011

# Supported fields for OMFIT_PROFS tree
fields:
  # Time
  - time
  - profiles_1d.time
  - ids_properties.homogeneous_time

  # Grid
  - profiles_1d.grid.rho_tor_norm
  - profiles_1d.grid.rho_pol_norm

  # Electrons
  - profiles_1d.electrons.density
  - profiles_1d.electrons.density_error_upper
  - profiles_1d.electrons.temperature
  - profiles_1d.electrons.temperature_error_upper

  # Electrons - Fit fields (raw measurements)
  - profiles_1d.electrons.density_fit.measured
  - profiles_1d.electrons.density_fit.psi_norm
  - profiles_1d.electrons.density_fit.rho_tor_norm
  - profiles_1d.electrons.density_fit.measured_error_upper
  - profiles_1d.electrons.temperature_fit.measured
  - profiles_1d.electrons.temperature_fit.psi_norm
  - profiles_1d.electrons.temperature_fit.rho_tor_norm
  - profiles_1d.electrons.temperature_fit.measured_error_upper

  # Ions (unified ion dimension - ak.Array with axes [time, ion, rho])
  # Ion ordering follows the `ions:` section above (D=index 0, C=index 1)
  - profiles_1d.ion.density_thermal
  - profiles_1d.ion.density_thermal_error_upper
  - profiles_1d.ion.temperature
  - profiles_1d.ion.temperature_error_upper
  - profiles_1d.ion.label
  - profiles_1d.ion.element.z_n
  - profiles_1d.ion.element.a

  # Ion fit fields (D has empty arrays, C has measured data)
  - profiles_1d.ion.density_fit.measured
  - profiles_1d.ion.density_fit.psi_norm
  - profiles_1d.ion.density_fit.rho_tor_norm
  - profiles_1d.ion.density_fit.measured_error_upper
  - profiles_1d.ion.temperature_fit.measured
  - profiles_1d.ion.temperature_fit.psi_norm
  - profiles_1d.ion.temperature_fit.rho_tor_norm
  - profiles_1d.ion.temperature_fit.measured_error_upper

  # Ion toroidal velocity (D and C share V_TOR_C; fit fields are C-only)
  - profiles_1d.ion.velocity.toroidal
  - profiles_1d.ion.velocity.toroidal_error_upper
  - profiles_1d.ion.velocity.toroidal_fit.measured
  - profiles_1d.ion.velocity.toroidal_fit.psi_norm
  - profiles_1d.ion.velocity.toroidal_fit.rho_tor_norm
  - profiles_1d.ion.velocity.toroidal_fit.measured_error_upper

  # E-field
  - profiles_1d.e_field.radial

  # Pressures
  - profiles_1d.pressure_ion_non_thermal
  - profiles_1d.pressure_ion_total
  - profiles_1d.electrons.pressure
  - profiles_1d.pressure_total

  # Current densities
  - profiles_1d.j_ohmic
  - profiles_1d.j_tor
  - profiles_1d.j_bootstrap

  # Global quantities
  - global_quantities.v_loop
