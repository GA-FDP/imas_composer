# PF Active (Poloidal Field) IDS Configuration for DIII-D
# Maps DIII-D PF coil hardware geometry and current measurements to IMAS

# Static values (none for this IDS)
static_values: {}

# Coil metadata - ordered list of 24 coils
# First 6 are flux coils (function index 0), remaining 18 are shaping coils (function index 1)
coil_names:
  - ECOILA
  - ECOILB
  - E567UP
  - E567DN
  - E89DN
  - E89UP
  - F1A
  - F2A
  - F3A
  - F4A
  - F5A
  - F6A
  - F7A
  - F8A
  - F9A
  - F1B
  - F2B
  - F3B
  - F4B
  - F5B
  - F6B
  - F7B
  - F8B
  - F9B

