# Core Profiles IDS Configuration for DIII-D
#
# This file provides shared defaults used by conftest.py.
# Mapper-specific field lists and ion definitions live in:
#   core_profiles_omfit.yaml   (OMFIT_PROFS tree)
#   core_profiles_zipfit.yaml  (ZIPFIT* trees)

# Profiles tree configuration
# Default to ZIPFIT01
default_profiles_tree: ZIPFIT01
default_profiles_run_id: '001'

# Static values (hardcoded, not from MDSplus)
static_values:
  ids_properties.homogeneous_time: 1

# Ion species mapping (order defines the ion array index in ak.Array outputs)
ions:
  - label: D
    z_n: 1.0
    a: 2.0141
  - label: C
    z_n: 6.0
    a: 12.011

# Reference field list (union of OMFIT and ZIPFIT supported fields)
# Ion fields use unified ion dimension (ak.Array [time, ion, rho/var])
# instead of per-ion indexed paths like ion.0.* / ion.1.*
fields:
  # Time - all trees
  - time
  - profiles_1d.time
  - ids_properties.homogeneous_time

  # Grid - all trees
  - profiles_1d.grid.rho_tor_norm

  # Grid - OMFIT_PROFS only
  - field: profiles_1d.grid.rho_pol_norm
    trees: [OMFIT_PROFS]

  # Electrons - all trees
  - profiles_1d.electrons.density
  - profiles_1d.electrons.temperature

  # Electrons - OMFIT_PROFS only (uncertainties)
  - field: profiles_1d.electrons.density_error_upper
    trees: [OMFIT_PROFS]
  - field: profiles_1d.electrons.temperature_error_upper
    trees: [OMFIT_PROFS]

  # Electrons - OMFIT_PROFS only (fit fields - raw measurements)
  - field: profiles_1d.electrons.density_fit.measured
    trees: [OMFIT_PROFS]
  - field: profiles_1d.electrons.density_fit.psi_norm
    trees: [OMFIT_PROFS]
  - field: profiles_1d.electrons.density_fit.rho_tor_norm
    trees: [OMFIT_PROFS]
  - field: profiles_1d.electrons.density_fit.measured_error_upper
    trees: [OMFIT_PROFS]
  - field: profiles_1d.electrons.temperature_fit.measured
    trees: [OMFIT_PROFS]
  - field: profiles_1d.electrons.temperature_fit.psi_norm
    trees: [OMFIT_PROFS]
  - field: profiles_1d.electrons.temperature_fit.rho_tor_norm
    trees: [OMFIT_PROFS]
  - field: profiles_1d.electrons.temperature_fit.measured_error_upper
    trees: [OMFIT_PROFS]

  # Ions (unified ion dimension - ak.Array [time, ion, rho])
  # Ion ordering: D=index 0, C=index 1 (from `ions:` section above)
  - profiles_1d.ion.density_thermal
  - profiles_1d.ion.temperature
  - profiles_1d.ion.label
  - profiles_1d.ion.element.z_n
  - profiles_1d.ion.element.a

  # Ions - OMFIT_PROFS only (uncertainties)
  - field: profiles_1d.ion.density_thermal_error_upper
    trees: [OMFIT_PROFS]
  - field: profiles_1d.ion.temperature_error_upper
    trees: [OMFIT_PROFS]

  # Ions - OMFIT_PROFS only (fit fields; D has empty arrays, C has measured data)
  - field: profiles_1d.ion.density_fit.measured
    trees: [OMFIT_PROFS]
  - field: profiles_1d.ion.density_fit.psi_norm
    trees: [OMFIT_PROFS]
  - field: profiles_1d.ion.density_fit.rho_tor_norm
    trees: [OMFIT_PROFS]
  - field: profiles_1d.ion.density_fit.measured_error_upper
    trees: [OMFIT_PROFS]
  - field: profiles_1d.ion.temperature_fit.measured
    trees: [OMFIT_PROFS]
  - field: profiles_1d.ion.temperature_fit.psi_norm
    trees: [OMFIT_PROFS]
  - field: profiles_1d.ion.temperature_fit.rho_tor_norm
    trees: [OMFIT_PROFS]
  - field: profiles_1d.ion.temperature_fit.measured_error_upper
    trees: [OMFIT_PROFS]

  # Ions - ZIPFIT only (rotation: D=NaN, C from TROTFIT)
  - field: profiles_1d.ion.rotation_frequency_tor
    trees: [ZIPFIT]

  # E-field - OMFIT_PROFS only
  - field: profiles_1d.e_field.radial
    trees: [OMFIT_PROFS]

  # Pressures - OMFIT_PROFS only
  - field: profiles_1d.pressure_ion_non_thermal
    trees: [OMFIT_PROFS]
  - field: profiles_1d.pressure_ion_total
    trees: [OMFIT_PROFS]
  - field: profiles_1d.electrons.pressure
    trees: [OMFIT_PROFS]
  - field: profiles_1d.pressure_total
    trees: [OMFIT_PROFS]

  # Global quantities - all trees
  - global_quantities.v_loop
