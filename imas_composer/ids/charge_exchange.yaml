# Charge Exchange IDS Configuration for DIII-D
# Maps DIII-D CER (Charge Exchange Recombination) diagnostic to IMAS charge_exchange IDS
#
# OMAS source: charge_exchange_data() in d3d.py
# MDSplus tree: IONS
# Analysis type: CERQUICK (default)

static_values: {}

# CER subsystems to include
subsystems:
  - TANGENTIAL
  - VERTICAL

# Supported fields (complete list of implemented IDS paths)
fields:
  - channel.identifier
  - channel.name
  - channel.position.r.data
  - channel.position.r.time
  - channel.position.z.data
  - channel.position.z.time
  - channel.position.phi.data
  - channel.position.phi.time
  - channel.zeff.data
  - channel.zeff.time
  - channel.ion.n_i_over_n_e.data
  - channel.ion.n_i_over_n_e.time
  - channel.ion.t_i.data
  - channel.ion.t_i.data_error_upper
  - channel.ion.t_i.time
# velocity is not a real IMAS field (it has velocity_tor and velocity_pol but the destinction depends on the beam orientation, e.g. channel)
  - channel.ion.velocity.data
# data_raw is not a real IMAS field either but is worth including since many channels don't have corrections
  - channel.ion.velocity.data_raw
  - channel.ion.velocity.data_error_upper
  - channel.ion.velocity.time
# total_installed_channels is not in OMAS; derived using getnci on the CALIBRATION tree
  - code.parameters.total_installed_channels
