# Magnetics IDS Configuration for DIII-D

# Supported fields (complete list of implemented IDS paths)
# Note: ip and diamagnetic_flux are arrays of measurements (length 2 for ip, length 1 for diamagnetic_flux on DIII-D)
fields:
  - ip.data
  - ip.time
  - ip.data_error_upper
  - ip.method_name
  - diamagnetic_flux.data
  - diamagnetic_flux.time
  - diamagnetic_flux.data_error_upper
